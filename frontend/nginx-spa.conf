server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options           DENY;
    add_header X-Content-Type-Options    nosniff;
    add_header Referrer-Policy           "strict-origin-when-cross-origin";

    # ── SPA routing ────────────────────────────────────────────────────────
    # All routes fall back to index.html so React Router handles them.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Static assets — long cache
    location ~* \.(js|css|png|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── API proxy ──────────────────────────────────────────────────────────
    # In docker-compose the frontend container proxies /api to the api service.
    # In K8s the Ingress handles this routing externally.
    location /api/ {
        proxy_pass         http://api:8000/api/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    # SSE streams — disable buffering, long timeout
    location /api/scans/ {
        proxy_pass          http://api:8000/api/scans/;
        proxy_set_header    Host $host;
        proxy_buffering     off;
        proxy_cache         off;
        proxy_read_timeout  900s;
        proxy_set_header    Connection '';
        chunked_transfer_encoding on;
    }
}
