---
# API Service
apiVersion: v1
kind: Service
metadata:
  name: {{ include "mste.fullname" . }}-api
  labels:
    {{- include "mste.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "mste.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
  ports:
    - port: 8000
      targetPort: 8000
      name: http

---
# Frontend Service
apiVersion: v1
kind: Service
metadata:
  name: {{ include "mste.fullname" . }}-frontend
  labels:
    {{- include "mste.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "mste.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
  ports:
    - port: 80
      targetPort: 80
      name: http

---
# Ingress — routes /api/* to API, /* to frontend
{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "mste.fullname" . }}
  labels:
    {{- include "mste.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations: {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls: {{- toYaml .Values.ingress.tls | nindent 4 }}
  {{- end }}
  rules:
  {{- range .Values.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
        {{- range .paths }}
          - path:     {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "mste.fullname" $ }}-{{ .service }}
                port:
                  number: {{ if eq .service "api" }}8000{{ else }}80{{ end }}
        {{- end }}
  {{- end }}
{{- end }}

---
# Scan artifacts PVC — shared ReadWriteMany between api and all workers.
# Requires an NFS provisioner or a CSI driver that supports RWX
# (e.g. AWS EFS, Azure Files, GCP Filestore, Longhorn).
{{- if .Values.persistence.artifacts.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "mste.fullname" . }}-artifacts
  labels:
    {{- include "mste.labels" . | nindent 4 }}
spec:
  accessModes:
    - {{ .Values.persistence.artifacts.accessMode }}
  {{- if .Values.persistence.artifacts.storageClass }}
  storageClassName: {{ .Values.persistence.artifacts.storageClass }}
  {{- end }}
  resources:
    requests:
      storage: {{ .Values.persistence.artifacts.size }}
{{- end }}

---
# Frontend Deployment — nginx serving the Vite-built React SPA
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "mste.fullname" . }}-frontend
  labels:
    {{- include "mste.labels" . | nindent 4 }}
    app.kubernetes.io/component: frontend
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      {{- include "mste.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: frontend
  template:
    metadata:
      labels:
        {{- include "mste.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: frontend
    spec:
      containers:
        - name: frontend
          image: "{{ .Values.global.imageRegistry }}{{ .Values.image.frontend.repository }}:{{ .Values.image.frontend.tag }}"
          imagePullPolicy: {{ .Values.image.frontend.pullPolicy }}
          ports:
            - containerPort: 80
          resources: {{- toYaml .Values.frontend.resources | nindent 12 }}
          livenessProbe:
            httpGet: { path: /, port: 80 }
            initialDelaySeconds: 5
            periodSeconds: 10
